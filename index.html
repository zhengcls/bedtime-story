<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小熊猫圆圆的竹林音乐会</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d1b2a 0%, #1b2d3e 40%, #2d3e50 100%);
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: #f0e6d3;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
    }
    /* 开始遮罩 */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 20, 35, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      text-align: center;
      padding: 20px;
    }
    #overlay .moon-emoji {
      font-size: 72px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    #overlay h1 {
      font-size: 22px;
      color: #f5d98b;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    #overlay p {
      font-size: 14px;
      color: #a0b8cc;
      margin-bottom: 40px;
    }
    #startBtn {
      background: linear-gradient(135deg, #f5a623, #e8851a);
      color: #1a0a00;
      border: none;
      border-radius: 50px;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(245, 166, 35, 0.5);
      animation: pulse 2s ease-in-out infinite;
      letter-spacing: 2px;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(245, 166, 35, 0.4); transform: scale(1); }
      50% { box-shadow: 0 0 40px rgba(245, 166, 35, 0.7); transform: scale(1.04); }
    }
    /* 主内容 */
    .header {
      text-align: center;
      margin-bottom: 24px;
      padding-top: 10px;
    }
    .header .icon { font-size: 48px; margin-bottom: 8px; }
    .header h1 {
      font-size: 20px;
      color: #f5d98b;
      letter-spacing: 1px;
      line-height: 1.5;
    }
    .header .subtitle {
      font-size: 13px;
      color: #7a9bb5;
      margin-top: 4px;
    }
    /* 音频播放器 */
    .player-wrap {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    audio {
      width: 100%;
      height: 44px;
      outline: none;
    }
    /* 自动播放开关 */
    .autoplay-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 12px;
      font-size: 13px;
      color: #8ab0c8;
    }
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }
    .toggle-switch input { display: none; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #2a4a65;
      border-radius: 12px;
      transition: background 0.3s;
    }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 18px; height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .toggle-switch input:checked ~ .toggle-track { background: #f5a623; }
    .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(20px); }
    /* 章节导航 */
    .chapters {
      width: 100%;
      max-width: 480px;
      margin-bottom: 20px;
    }
    .chapters-title {
      font-size: 13px;
      color: #7a9bb5;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    .chapter-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .chapter-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: #c0d8ee;
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .chapter-btn:hover { background: rgba(245,166,35,0.15); border-color: rgba(245,166,35,0.4); }
    .chapter-btn.active {
      background: rgba(245,166,35,0.25);
      border-color: #f5a623;
      color: #f5d98b;
      font-weight: bold;
    }
    /* 上一章/下一章 */
    .nav-btns {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .nav-btn {
      flex: 1;
      max-width: 160px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: #c0d8ee;
      border-radius: 24px;
      padding: 10px 0;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-btn:hover:not(:disabled) { background: rgba(245,166,35,0.2); border-color: #f5a623; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    /* 故事文字区 */
    .story-card {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .story-chapter-title {
      font-size: 14px;
      color: #f5a623;
      margin-bottom: 12px;
      font-weight: bold;
      letter-spacing: 1px;
    }
    .story-text {
      font-size: 15px;
      line-height: 1.9;
      color: #ddeeff;
    }
    /* 版权 */
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #3a5570;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- 开始遮罩 -->
<div id="overlay">
  <div class="moon-emoji">🌙</div>
  <h1>小熊猫圆圆的竹林音乐会</h1>
  <p>温馨睡前故事 · 共7章 · 约3分42秒</p>
  <button id="startBtn" onclick="startStory()">开始收听</button>
</div>

<!-- 主内容 -->
<div class="header">
  <div class="icon">🐼</div>
  <h1>小熊猫圆圆的竹林音乐会</h1>
  <div class="subtitle">温馨睡前故事 · 共7章</div>
</div>

<!-- 播放器 -->
<div class="player-wrap">
  <audio id="player" controls preload="auto" playsinline webkit-playsinline
         x5-playsinline x5-video-player-type="h5" x5-video-player-fullscreen="false"></audio>
  <div class="autoplay-bar">
    <span>自动连播</span>
    <label class="toggle-switch">
      <input type="checkbox" id="autoPlayToggle" checked onchange="toggleAutoPlay(this.checked)">
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
  </div>
</div>

<!-- 章节按钮 -->
<div class="chapters">
  <div class="chapters-title">章节导航</div>
  <div class="chapter-btns" id="chapterBtns"></div>
</div>

<!-- 上下章按钮 -->
<div class="nav-btns">
  <button class="nav-btn" id="prevBtn" onclick="prevChapter()">上一章</button>
  <button class="nav-btn" id="nextBtn" onclick="nextChapter()">下一章</button>
</div>

<!-- 故事文字 -->
<div class="story-card">
  <div class="story-chapter-title" id="chapterTitle"></div>
  <div class="story-text" id="storyText"></div>
</div>

<div class="footer">每晚好梦 · 龙虾机器人出品</div>

<script>
const chapters = [
  {
    title: "第1章 · 神奇的声音",
    text: "竹林深处住着一只胖乎乎的小熊猫，名叫圆圆。他有一双圆滚滚的黑眼睛，耳朵上有两个小绒球，走路的时候总是摇摇晃晃，可爱极了。圆圆最喜欢做的事，就是爬上最高的竹子，看云朵在天上飘来飘去。今天，他听到了一阵奇妙的声音，是竹叶被风吹动的沙沙声，像音乐一样好听。圆圆竖起耳朵，心想：要是能把这声音留下来就好了。",
    start: 0, end: 31.008
  },
  {
    title: "第2章 · 邀请朋友们",
    text: "圆圆决定在竹林里举办一场音乐会。他跑去找好朋友小兔子跳跳，说：跳跳，你愿意来唱歌吗？跳跳拍着小爪子说：当然愿意！我会唱月亮歌！圆圆又找到了小松鼠栗栗，栗栗说她会用两根树枝敲出好听的节拍。然后圆圆遇到了住在大石头下面的青蛙咕咕，咕咕说：我的呱呱声是最好的低音！大家都答应来参加，圆圆高兴得翻了个跟头。",
    start: 31.008, end: 62.568
  },
  {
    title: "第3章 · 布置舞台",
    text: "第二天早晨，圆圆早早起来，用竹叶铺了一个圆圆的舞台，又摘了许多小野花插在旁边。他用细树枝做了小指挥棒，戴上竹叶折的小帽子，对着水塘照了照，觉得自己帅极了。小鸟们飞来飞去，好奇地问发生了什么，圆圆神秘地说：今晚，竹林里会有一场最美的音乐会，你们都来听吧！小鸟们叽叽喳喳地飞走传递消息，整个竹林都沸腾起来了。",
    start: 62.568, end: 92.496
  },
  {
    title: "第4章 · 音乐会开始",
    text: "傍晚，夕阳把竹林染成了金黄色。小动物们陆陆续续来到竹叶舞台前，有小鹿、小松鼠、小刺猬，还有几只五彩斑斓的蝴蝶。大家找到自己的位置坐下，眼睛都亮晶晶地望着圆圆。圆圆深呼一口气，举起小指挥棒，微微一挥。跳跳开始唱歌，声音甜甜的，像蜂蜜流过草尖；栗栗敲打树枝，节奏轻快又欢快；咕咕低声伴唱，像远处的鼓声一样沉稳。竹叶的沙沙声也恰好在微风中响起，把所有声音都包裹在一起。",
    start: 92.496, end: 130.752
  },
  {
    title: "第5章 · 忽然下雨了",
    text: "音乐会正进行到最美的时候，突然，一片乌云飘了过来，轰隆隆地打了一声雷，大家都吓了一跳。雨水嗒嗒地落下来，把竹叶舞台打湿了。小动物们纷纷躲到大竹子下面，圆圆急得团团转。就在这时，老獾爷爷慢悠悠地走来，搬来一片宽宽的大竹叶，撑成了一把天然大伞。大家挤在一起，雨声叮叮当当，反而成了新的伴奏，比刚才还要好听。",
    start: 130.752, end: 160.776
  },
  {
    title: "第6章 · 月光下的歌声",
    text: "雨渐渐停了，竹叶上的水珠像小珍珠一样滚动着。天边升起了一弯弦月，把银白色的光洒进竹林，整个舞台都亮了起来。圆圆站在月光里，感觉心里暖暖的，软软的，像是被什么轻轻抱住了一样。他抬起小指挥棒，大家会意地又唱起来，歌声随着竹叶的摇曳飘向远方。林子里所有的小动物都安静地听着，连平时最吵闹的小蝉也不说话了。",
    start: 160.776, end: 191.184
  },
  {
    title: "第7章 · 甜甜的梦乡",
    text: "音乐会结束了，大家依依不舍地道晚安。圆圆躺在柔软的竹叶堆里，仰望满天星星。他想：今天真是最美好的一天。风轻轻地吹来，竹叶又发出了那熟悉的沙沙声，就像在给圆圆唱一首专属的摇篮曲。圆圆的眼皮越来越重，嘴角弯成了一个小小的弧度。月光盖在他身上，星星守在他旁边，他在竹林音乐会的余韵里，甜甜地进入了梦乡。",
    start: 191.184, end: 222.024
  }
];

let currentChapter = 0;
let autoPlay = true;
const player = document.getElementById('player');

// 初始化
player.src = "audio/full.mp3";
player.load();

function startStory() {
  document.getElementById('overlay').style.display = 'none';
  player.currentTime = chapters[0].start;
  player.play().catch(() => {});
}

function updateChapterUI(idx) {
  currentChapter = idx;
  document.getElementById('chapterTitle').textContent = chapters[idx].title;
  document.getElementById('storyText').textContent = chapters[idx].text;
  document.querySelectorAll('.chapter-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === chapters.length - 1;
}

function changeChapter(idx) {
  updateChapterUI(idx);
  player.currentTime = chapters[idx].start;
  player.play().catch(() => {});
}

function prevChapter() {
  if (currentChapter > 0) changeChapter(currentChapter - 1);
}

function nextChapter() {
  if (currentChapter < chapters.length - 1) changeChapter(currentChapter + 1);
}

function toggleAutoPlay(val) {
  autoPlay = val;
}

player.addEventListener('timeupdate', () => {
  const t = player.currentTime;
  // 自动同步章节UI
  for (let i = chapters.length - 1; i >= 0; i--) {
    if (t >= chapters[i].start) {
      if (currentChapter !== i) updateChapterUI(i);
      break;
    }
  }
  // 单章模式：自动暂停
  if (!autoPlay) {
    const ch = chapters[currentChapter];
    if (t >= ch.end - 0.2 && currentChapter < chapters.length - 1) {
      player.pause();
    }
  }
});

// 初始化章节按钮
const btnContainer = document.getElementById('chapterBtns');
chapters.forEach((ch, i) => {
  const btn = document.createElement('button');
  btn.className = 'chapter-btn';
  btn.textContent = `第${i+1}章`;
  btn.onclick = () => changeChapter(i);
  btnContainer.appendChild(btn);
});

// 初始化UI
updateChapterUI(0);
</script>
</body>
</html>
