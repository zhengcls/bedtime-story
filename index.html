<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小刺猬团团的萤火虫之夜</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0d1b2a 0%, #1b2d45 40%, #0f2744 70%, #1a1035 100%);
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #e8d5b0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
  }

  /* 顶部标题 */
  .title-area {
    text-align: center;
    margin-bottom: 24px;
    margin-top: 10px;
  }
  .title-area h1 {
    font-size: 1.5rem;
    color: #ffd97d;
    text-shadow: 0 0 20px rgba(255,210,80,0.5);
    line-height: 1.4;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #a0b8cc;
    margin-top: 6px;
  }

  /* 开始遮罩 */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,18,35,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 16px;
  }
  #overlay .overlay-title {
    font-size: 1.4rem;
    color: #ffd97d;
    text-align: center;
    padding: 0 24px;
  }
  #overlay .overlay-sub {
    font-size: 0.9rem;
    color: #a0b8cc;
    text-align: center;
    padding: 0 32px;
  }
  #startBtn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffd97d, #ffb830);
    border: none;
    cursor: pointer;
    font-size: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse 2s ease-in-out infinite;
    box-shadow: 0 0 30px rgba(255,184,48,0.6);
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(255,184,48,0.6); }
    50% { transform: scale(1.08); box-shadow: 0 0 50px rgba(255,184,48,0.9); }
  }

  /* 故事文字卡片 */
  .story-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,220,100,0.15);
    border-radius: 16px;
    padding: 20px 18px;
    width: 100%;
    max-width: 520px;
    min-height: 120px;
    margin-bottom: 20px;
    line-height: 1.9;
    font-size: 1.05rem;
    color: #e8d5b0;
    transition: all 0.4s ease;
  }
  .story-card .ch-label {
    font-size: 0.8rem;
    color: #ffd97d;
    margin-bottom: 8px;
    opacity: 0.8;
  }

  /* 音频播放器 */
  .player-wrap {
    width: 100%;
    max-width: 520px;
    margin-bottom: 20px;
  }
  audio {
    width: 100%;
    border-radius: 10px;
  }

  /* 章节按钮 */
  .chapters-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    width: 100%;
    max-width: 520px;
    margin-bottom: 18px;
  }
  .ch-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid rgba(255,220,100,0.3);
    background: rgba(255,255,255,0.06);
    color: #c8b890;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .ch-btn.active {
    background: rgba(255,210,80,0.25);
    border-color: #ffd97d;
    color: #ffd97d;
    box-shadow: 0 0 12px rgba(255,210,80,0.3);
  }
  .ch-btn:hover { opacity: 0.8; }

  /* 上一章/下一章 + 自动连播 */
  .controls-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 520px;
  }
  .nav-btn {
    padding: 9px 20px;
    border-radius: 22px;
    border: 1px solid rgba(255,220,100,0.35);
    background: rgba(255,255,255,0.07);
    color: #e8d5b0;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.14); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .auto-toggle {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.85rem;
    color: #a0b8cc;
    cursor: pointer;
    user-select: none;
  }
  .auto-toggle input { width: 16px; height: 16px; cursor: pointer; accent-color: #ffd97d; }

  /* 底部装饰 */
  .footer {
    margin-top: 30px;
    font-size: 0.75rem;
    color: rgba(160,184,204,0.5);
    text-align: center;
  }

  /* 萤火虫装饰 */
  .firefly {
    position: fixed;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #ffd97d;
    pointer-events: none;
    animation: fly linear infinite;
    opacity: 0;
  }
  @keyframes fly {
    0%   { opacity: 0; transform: translate(0,0) scale(1); }
    20%  { opacity: 0.8; }
    80%  { opacity: 0.6; }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.5); }
  }
</style>
</head>
<body>

<!-- 开始遮罩 -->
<div id="overlay">
  <div class="overlay-title">小刺猬团团的萤火虫之夜</div>
  <div class="overlay-sub">轻轻点击，开始今晚的故事</div>
  <button id="startBtn">▶</button>
</div>

<!-- 标题 -->
<div class="title-area">
  <h1>小刺猬团团的萤火虫之夜</h1>
  <div class="subtitle">共8章 · 约2分31秒</div>
</div>

<!-- 故事文字 -->
<div class="story-card">
  <div class="ch-label" id="chLabel">第1章</div>
  <div id="storyText">小刺猬团团住在一片安静的树林里。他的背上长着许多小刺，睡觉的时候总喜欢蜷缩成一个圆球。今晚，团团睡不着，他悄悄从落叶堆里爬出来，抬头看了看深蓝色的夜空，发现天上少了好几颗星星。</div>
</div>

<!-- 音频播放器 -->
<div class="player-wrap">
  <audio id="player" controls preload="auto" playsinline webkit-playsinline
         x5-playsinline x5-video-player-type="h5" x5-video-player-fullscreen="false">
  </audio>
</div>

<!-- 章节按钮 -->
<div class="chapters-grid" id="chaptersGrid"></div>

<!-- 控制栏 -->
<div class="controls-row">
  <button class="nav-btn" id="prevBtn" onclick="prevChapter()" disabled>上一章</button>
  <label class="auto-toggle">
    <input type="checkbox" id="autoPlay" checked>
    自动连播
  </label>
  <button class="nav-btn" id="nextBtn" onclick="nextChapter()">下一章</button>
</div>

<div class="footer">晚安，做个好梦 🌙</div>

<script>
const chapters = [
  { title: "第1章", text: "小刺猬团团住在一片安静的树林里。他的背上长着许多小刺，睡觉的时候总喜欢蜷缩成一个圆球。今晚，团团睡不着，他悄悄从落叶堆里爬出来，抬头看了看深蓝色的夜空，发现天上少了好几颗星星。", start: 0, end: 18.6 },
  { title: "第2章", text: "团团顺着小路走啊走，忽然看见草丛里有一点一点的光，忽明忽灭，像小小的灯笼。那是什么呀？团团好奇地凑近去看，原来是一群萤火虫正在开派对！萤火虫小姐姐看见团团，笑着说：你来啦，我们正等着多一位朋友呢！", start: 18.6, end: 39.168 },
  { title: "第3章", text: "萤火虫们围着团团飞啊飞，把柔软的光洒在他身上。团团的小刺也被照得亮晶晶的，像是镶了一圈星星。团团第一次发现，原来自己的刺这么好看。他害羞地低下头，耳朵都红了。", start: 39.168, end: 56.28 },
  { title: "第4章", text: "萤火虫里有一只叫亮亮的小家伙，个头比别人小一圈，总是飞在最后面。团团问他：你累不累？亮亮说：有点累，但我喜欢发光，只要有人看见，就值得。团团听了，心里暖暖的，悄悄把亮亮接到自己的背上，托着他一起走。", start: 56.28, end: 76.992 },
  { title: "第5章", text: "他们走到了一棵大树旁，树上有一个圆圆的树洞。树洞里住着睡着了的猫头鹰爷爷。萤火虫们把光聚在一起，轻轻照亮了树洞门口。团团把一朵小花放在门口，留给猫头鹰爷爷明天醒来的惊喜。", start: 76.992, end: 94.776 },
  { title: "第6章", text: "夜越来越深，露水落在草尖上，亮晶晶的。萤火虫们一个一个打起了哈欠，亮亮也靠在团团背上睡着了。团团踮起脚，轻轻地走，生怕吵醒小伙伴。他心里想：今晚真好，有光，有朋友，还有说不完的快乐。", start: 94.776, end: 114.312 },
  { title: "第7章", text: "快到家了，团团把亮亮轻轻放进草丛里，盖上一片软软的叶子。亮亮在梦里笑了笑，小小的身子还在发着微光。团团也钻回落叶堆，蜷成圆球，闭上眼睛。他听见风在树梢轻轻唱歌，不一会儿，就甜甜地睡着了。", start: 114.312, end: 134.688 },
  { title: "第8章", text: "第二天清晨，猫头鹰爷爷看见门口的小花，笑得胡子都翘起来了。他不知道是谁送的，但心里很温暖。而团团还在落叶堆里睡觉，嘴角微微翘着，一定在梦里又和萤火虫们跳舞呢。", start: 134.688, end: 151.344 },
];

const player = document.getElementById('player');
let currentChapter = 0;

// 设置音频源（只设一次）
player.src = 'audio/full.mp3';
player.load();

// 生成章节按钮
const grid = document.getElementById('chaptersGrid');
chapters.forEach((ch, i) => {
  const btn = document.createElement('button');
  btn.className = 'ch-btn' + (i === 0 ? ' active' : '');
  btn.textContent = ch.title;
  btn.onclick = () => changeChapter(i);
  btn.id = 'chBtn' + i;
  grid.appendChild(btn);
});

// 开始按钮
function startStory() {
  document.getElementById('overlay').style.display = 'none';
  player.currentTime = chapters[0].start;
  player.play().catch(() => {});
}
document.getElementById('startBtn').addEventListener('click', startStory);

// 切换章节（只 seek，不换 src）
function changeChapter(idx) {
  currentChapter = idx;
  player.currentTime = chapters[idx].start;
  player.play().catch(() => {});
  updateUI(idx);
}

function updateUI(idx) {
  document.getElementById('chLabel').textContent = chapters[idx].title;
  document.getElementById('storyText').textContent = chapters[idx].text;
  document.querySelectorAll('.ch-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
  document.getElementById('prevBtn').disabled = (idx === 0);
  document.getElementById('nextBtn').disabled = (idx === chapters.length - 1);
}

function prevChapter() {
  if (currentChapter > 0) changeChapter(currentChapter - 1);
}
function nextChapter() {
  if (currentChapter < chapters.length - 1) changeChapter(currentChapter + 1);
}

// 时间同步
player.addEventListener('timeupdate', () => {
  const t = player.currentTime;
  // 找当前章
  for (let i = chapters.length - 1; i >= 0; i--) {
    if (t >= chapters[i].start) {
      if (currentChapter !== i) {
        currentChapter = i;
        updateUI(i);
      }
      break;
    }
  }
  // 非自动连播时，到章末暂停
  const autoPlay = document.getElementById('autoPlay').checked;
  if (!autoPlay) {
    const ch = chapters[currentChapter];
    if (player.currentTime >= ch.end - 0.2 && currentChapter < chapters.length - 1) {
      player.pause();
    }
  }
});

// 初始化UI
updateUI(0);

// 萤火虫装饰
function createFirefly() {
  const f = document.createElement('div');
  f.className = 'firefly';
  f.style.left = Math.random() * 100 + 'vw';
  f.style.top = Math.random() * 100 + 'vh';
  const dur = 4 + Math.random() * 6;
  f.style.animationDuration = dur + 's';
  f.style.animationDelay = Math.random() * 5 + 's';
  f.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
  f.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'px');
  document.body.appendChild(f);
  setTimeout(() => f.remove(), (dur + 5) * 1000);
}
setInterval(createFirefly, 800);
for (let i = 0; i < 8; i++) createFirefly();
</script>
</body>
</html>
