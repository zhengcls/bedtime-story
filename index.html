<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>宝贝晚安 · 睡前故事</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#0a0a2e;color:#fff;min-height:100vh;overflow-x:hidden}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px 16px}
.moon{font-size:28px;margin:12px 0 0}
.title{font-size:26px;font-weight:700;background:linear-gradient(135deg,#ffd700,#ffb347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:4px 0 4px}
.subtitle{font-size:13px;color:rgba(255,255,255,.45);margin-bottom:18px}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:24px 20px;max-width:560px;width:100%}
.story-title{font-size:20px;font-weight:600;color:#ffd700;text-align:center;margin-bottom:4px}
.chapter-nav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0 16px}
.ch-btn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,215,0,.3);background:rgba(255,215,0,.08);color:#ffd700;font-size:13px;cursor:pointer;-webkit-appearance:none;appearance:none}
.ch-btn.active{background:#ffd700;color:#0a0a2e;font-weight:700;border-color:#ffd700}
.text-box{min-height:160px;font-size:19px;line-height:2;color:rgba(255,255,255,.88);text-align:center;padding:8px 0;letter-spacing:.5px}
.text-box .cursor{display:inline-block;width:2px;height:1em;background:#ffd700;vertical-align:text-bottom;margin-left:2px;-webkit-animation:blink .8s infinite;animation:blink .8s infinite}
@-webkit-keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.hint{color:rgba(255,255,255,.35);font-size:13px;text-align:center;padding:4px 0}
.loading{color:rgba(255,215,0,.7);font-size:13px;text-align:center;padding:6px 0;display:none}
.error-msg{color:#ff6b6b;font-size:13px;text-align:center;padding:6px 0;display:none}
.controls{display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.btn{padding:10px 22px;border-radius:18px;border:1px solid rgba(255,215,0,.4);background:rgba(255,215,0,.1);color:#ffd700;font-size:15px;cursor:pointer;white-space:nowrap;-webkit-appearance:none;appearance:none}
.btn.primary{background:#ffd700;color:#0a0a2e;font-weight:600;border-color:#ffd700}
.btn:disabled{opacity:.4;cursor:default}
.progress{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:12px;color:rgba(255,255,255,.4)}
.prog-bar{flex:1;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#ffd700,#ffb347);width:0;transition:width .3s}
</style>
</head>
<body>
<div class="wrap">
  <div class="moon">&#127769;</div>
  <div class="title">&#x5B9D;&#x8D1D;&#x665A;&#x5B89;</div>
  <div class="subtitle">&#x4ECA;&#x65E5;&#x7761;&#x524D;&#x6545;&#x4E8B;</div>
  <div class="card">
    <div class="story-title" id="storyTitle"></div>
    <div class="chapter-nav" id="chNav"></div>
    <div class="text-box" id="textBox"></div>
    <div class="hint" id="hintEl">&#x70B9;&#x51FB;&#x201C;&#x5F00;&#x59CB;&#x6717;&#x8BFB;&#x201D;&#x6536;&#x542C;&#x6545;&#x4E8B; &#x2022; &#x6BCF;&#x65E5;&#x81EA;&#x52A8;&#x66F4;&#x6362;</div>
    <div class="loading" id="loadingEl">&#x23F3; &#x97F3;&#x9891;&#x52A0;&#x8F7D;&#x4E2D;...</div>
    <div class="error-msg" id="errorEl"></div>
    <div class="controls">
      <button class="btn primary" id="playBtn">&#x5F00;&#x59CB;&#x6717;&#x8BFB;</button>
      <button class="btn" id="prevBtn">&#x4E0A;&#x4E00;&#x7AE0;</button>
      <button class="btn" id="nextBtn">&#x4E0B;&#x4E00;&#x7AE0;</button>
    </div>
    <div class="progress">
      <span id="progText"></span>
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    </div>
  </div>
</div>
<!-- 关键修复: 在 HTML 中放置 audio 标签，确保微信 WebView 正确识别 -->
<audio id="audioEl" preload="none" playsinline webkit-playsinline></audio>

<script>
(function() {
  'use strict';

  // ========== 故事数据库（7个故事，按日期轮换） ==========
  var STORIES = [
    {
      title: '\u5c0f\u8424\u706b\u866b\u4eae\u4eae\u7684\u661f\u5149\u68a6',
      chapters: [
        '\u5728\u4e00\u7247\u7f8e\u4e3d\u7684\u68ee\u6797\u6df1\u5904\uff0c\u4f4f\u7740\u4e00\u53ea\u540d\u53eb\u4eae\u4eae\u7684\u5c0f\u8424\u706b\u866b\u3002\u4eae\u4eae\u6709\u4e00\u4e2a\u5c0f\u5c0f\u7684\u8eab\u4f53\uff0c\u5374\u6709\u4e00\u76cf\u7279\u522b\u660e\u4eae\u7684\u706f\u3002\u6bcf\u5929\u665a\u4e0a\uff0c\u4ed6\u90fd\u4f1a\u63d0\u7740\u81ea\u5df1\u7684\u5c0f\u706f\u7b3c\uff0c\u5728\u82b1\u4e1b\u548c\u8349\u53f6\u4e4b\u95f4\u98de\u6765\u98de\u53bb\uff0c\u50cf\u4e00\u9897\u79fb\u52a8\u7684\u5c0f\u661f\u661f\u3002\u68ee\u6797\u91cc\u7684\u5c0f\u52a8\u7269\u4eec\u90fd\u559c\u6b22\u8ddf\u7740\u4eae\u4eae\u7684\u5149\u8d70\u8def\uff0c\u56e0\u4e3a\u4ed6\u4ece\u6765\u4e0d\u4f1a\u8ba9\u5927\u5bb6\u8ff7\u8def\u3002',
        '\u8fd9\u5929\u508d\u665a\uff0c\u4eae\u4eae\u6b63\u98de\u8fc7\u4e00\u7247\u84b2\u516c\u82f1\u82b1\u7530\uff0c\u5ffd\u7136\u542c\u5230\u4e86\u4e00\u9635\u5c0f\u5c0f\u7684\u54ed\u58f0\u3002\u4ed6\u987a\u7740\u58f0\u97f3\u98de\u8fc7\u53bb\uff0c\u53d1\u73b0\u8349\u4e1b\u91cc\u8737\u7740\u4e00\u53ea\u767d\u8272\u7684\u5c0f\u5154\u5b50\u3002\u5c0f\u5154\u5b50\u7684\u8033\u6735\u8037\u62c9\u7740\uff0c\u773c\u775b\u7ea2\u7ea2\u7684\uff0c\u770b\u8d77\u6765\u53c8\u5bb3\u6015\u53c8\u96be\u8fc7\u3002\u4eae\u4eae\u8f7b\u8f7b\u98de\u5230\u5979\u8eab\u8fb9\uff0c\u6e29\u67d4\u5730\u95ee\uff0c\u5c0f\u5154\u5b50\uff0c\u4f60\u600e\u4e48\u4e00\u4e2a\u4eba\u5728\u8fd9\u91cc\u54ed\u5440\uff1f',
        '\u5c0f\u5154\u5b50\u64e6\u64e6\u773c\u6cea\u8bf4\uff0c\u6211\u53eb\u68c9\u82b1\uff0c\u6211\u548c\u5988\u5988\u8d70\u6563\u4e86\uff0c\u5929\u9ed1\u4e86\uff0c\u6211\u627e\u4e0d\u5230\u56de\u5bb6\u7684\u8def\u3002\u5929\u4e0a\u7684\u661f\u661f\u597d\u591a\uff0c\u53ef\u662f\u5730\u4e0a\u9ed1\u6f06\u6f06\u7684\uff0c\u6211\u5bb3\u6015\u6781\u4e86\u3002\u4eae\u4eae\u542c\u4e86\u5fc3\u75bc\u6781\u4e86\uff0c\u4ed6\u62cd\u62cd\u5c0f\u80f8\u812f\u8bf4\uff0c\u522b\u6015\uff0c\u6211\u9001\u4f60\u56de\u5bb6\u3002\u6211\u7684\u706f\u7b3c\u53ef\u4eae\u4e86\uff0c\u4e00\u5b9a\u80fd\u5e2e\u4f60\u627e\u5230\u5988\u5988\u3002',
        '\u4e8e\u662f\uff0c\u4eae\u4eae\u5728\u524d\u9762\u98de\uff0c\u68c9\u82b1\u5728\u540e\u9762\u8ddf\u7740\u3002\u4ed6\u4eec\u7a7f\u8fc7\u4e86\u4e00\u7247\u957f\u6ee1\u8611\u83c7\u7684\u5c0f\u8def\uff0c\u8611\u83c7\u4e0a\u6cbe\u7740\u9732\u6c34\uff0c\u5728\u4eae\u4eae\u7684\u5149\u4e0b\u95ea\u95ea\u53d1\u5149\uff0c\u50cf\u4e00\u76cf\u76cf\u5c0f\u706f\u3002\u68c9\u82b1\u7b2c\u4e00\u6b21\u89c9\u5f97\u591c\u665a\u7684\u68ee\u6797\u4e5f\u53ef\u4ee5\u8fd9\u4e48\u7f8e\u3002\u4e00\u53ea\u5c0f\u677e\u9f20\u4ece\u6811\u6d1e\u91cc\u63a2\u51fa\u5934\u6765\uff0c\u8bf4\uff0c\u4eae\u4eae\uff0c\u4f60\u53c8\u6765\u5e2e\u52a9\u670b\u53cb\u4e86\u5417\uff1f\u771f\u4e86\u4e0d\u8d77\u3002',
        '\u8d70\u7740\u8d70\u7740\uff0c\u4ed6\u4eec\u6765\u5230\u4e86\u4e00\u6761\u5c0f\u6eaa\u8fb9\u3002\u6eaa\u6c34\u54d7\u54d7\u5730\u6d41\u7740\uff0c\u6321\u4f4f\u4e86\u53bb\u8def\u3002\u68c9\u82b1\u7740\u6025\u4e86\uff0c\u8bf4\u6211\u8fc7\u4e0d\u53bb\u5440\u3002\u4eae\u4eae\u56db\u5904\u770b\u770b\uff0c\u53d1\u73b0\u6eaa\u8fb9\u6709\u4e00\u6392\u5927\u8377\u53f6\uff0c\u521a\u597d\u4ece\u8fd9\u4e00\u5934\u8fde\u5230\u90a3\u4e00\u5934\u3002\u4eae\u4eae\u5728\u8377\u53f6\u4e0a\u65b9\u7167\u4eae\uff0c\u68c9\u82b1\u5c0f\u5fc3\u7ffc\u7ffc\u5730\u8e29\u7740\u8377\u53f6\uff0c\u4e00\u6b65\u4e00\u6b65\uff0c\u6447\u6447\u6643\u6643\u5730\u8fc7\u4e86\u5c0f\u6eaa\u3002\u597d\u9669\u5440\uff0c\u68c9\u82b1\u7b11\u7740\u8bf4\u3002',
        '\u7ec8\u4e8e\uff0c\u4ed6\u4eec\u95fb\u5230\u4e86\u4e00\u80a1\u751c\u751c\u7684\u80e1\u841d\u535c\u9999\u5473\u3002\u68c9\u82b1\u4e00\u4e0b\u5b50\u7ad6\u8d77\u8033\u6735\uff0c\u9ad8\u5174\u5730\u8df3\u4e86\u8d77\u6765\uff0c\u662f\u6211\u5bb6\uff0c\u662f\u6211\u5bb6\uff01\u4e00\u5ea7\u6e29\u6696\u7684\u6811\u6d1e\u5c0f\u5c4b\u51fa\u73b0\u5728\u773c\u524d\uff0c\u95e8\u53e3\u6302\u7740\u4e00\u76cf\u5c0f\u706f\u3002\u5154\u5988\u5988\u6b63\u7126\u6025\u5730\u7ad9\u5728\u95e8\u53e3\u5f20\u671b\u3002\u770b\u5230\u68c9\u82b1\uff0c\u5154\u5988\u5988\u8d76\u7d27\u8dd1\u8fc7\u6765\uff0c\u7d27\u7d27\u5730\u62b1\u4f4f\u4e86\u5979\uff0c\u5b9d\u8d1d\uff0c\u4f60\u53ef\u56de\u6765\u4e86\uff0c\u5988\u5988\u597d\u62c5\u5fc3\u4f60\u5440\u3002',
        '\u5154\u5988\u5988\u8bf7\u4eae\u4eae\u8fdb\u5c4b\u559d\u4e86\u6696\u6696\u7684\u8702\u871c\u6c34\uff0c\u68c9\u82b1\u62c9\u7740\u4eae\u4eae\u7684\u624b\u8bf4\uff0c\u8c22\u8c22\u4f60\u9001\u6211\u56de\u5bb6\uff0c\u4f60\u662f\u6211\u89c1\u8fc7\u6700\u4eae\u7684\u661f\u661f\u3002\u4eae\u4eae\u5bb3\u7f9e\u5730\u7b11\u4e86\uff0c\u4ed6\u8bf4\uff0c\u6bcf\u4e2a\u5e2e\u52a9\u522b\u4eba\u7684\u5c0f\u670b\u53cb\uff0c\u5fc3\u91cc\u90fd\u6709\u4e00\u76cf\u5f88\u4eae\u5f88\u4eae\u7684\u706f\u3002\u591c\u6df1\u4e86\uff0c\u68ee\u6797\u5b89\u9759\u4e0b\u6765\u3002\u4eae\u4eae\u98de\u56de\u4e86\u81ea\u5df1\u7684\u5c0f\u7a9d\uff0c\u4ed6\u4eca\u5929\u7279\u522b\u5f00\u5fc3\uff0c\u56e0\u4e3a\u4ed6\u77e5\u9053\uff0c\u81ea\u5df1\u7684\u5149\uff0c\u53ef\u4ee5\u8ba9\u9ed1\u591c\u53d8\u5f97\u6e29\u6696\u53c8\u5b89\u5fc3\u3002\u665a\u5b89\uff0c\u5c0f\u8424\u706b\u866b\u3002\u665a\u5b89\uff0c\u5168\u4e16\u754c\u3002'
      ]
    }
  ];

  // ========== 状态变量 ==========
  var currentStory = 0;
  var currentCh = 0;
  var isPlaying = false;
  var typeTimer = null;
  var typeIdx = 0;
  var typeText = '';

  // ========== DOM 引用 ==========
  var audio = document.getElementById('audioEl');
  var playBtn = document.getElementById('playBtn');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');
  var textBox = document.getElementById('textBox');
  var loadingEl = document.getElementById('loadingEl');
  var errorEl = document.getElementById('errorEl');
  var hintEl = document.getElementById('hintEl');
  var storyTitleEl = document.getElementById('storyTitle');
  var progTextEl = document.getElementById('progText');
  var progFillEl = document.getElementById('progFill');

  // ========== 工具函数 ==========
  function $(id) { return document.getElementById(id); }

  function getBaseUrl() {
    // 确保音频路径始终正确，兼容微信各种 URL 格式
    var base = window.location.pathname;
    base = base.substring(0, base.lastIndexOf('/') + 1);
    return base || '/';
  }

  function showEl(id, show) {
    var el = $(id);
    if (el) el.style.display = show ? 'block' : 'none';
  }

  function setError(msg) {
    if (errorEl) { errorEl.textContent = msg; showEl('errorEl', true); }
  }

  function clearError() { showEl('errorEl', false); }

  // ========== 打字机效果 ==========
  function startTyping(text, callback) {
    stopTyping();
    typeIdx = 0;
    typeText = text;
    textBox.innerHTML = '<span id="typedText"></span><span class="cursor"></span>';
    function typeChar() {
      if (typeIdx < typeText.length) {
        var typedEl = $('typedText');
        if (typedEl) typedEl.textContent = typeText.substring(0, typeIdx + 1);
        typeIdx++;
        // 每个字符间隔 60ms，标点符号间隔 150ms
        var ch = typeText.charAt(typeIdx - 1);
        var delay = '\uff0c\u3002\uff01\uff1f\u2026'.indexOf(ch) >= 0 ? 150 : 60;
        typeTimer = setTimeout(typeChar, delay);
      } else {
        // 打字完成，移除光标
        var cursorEl = textBox.querySelector('.cursor');
        if (cursorEl) cursorEl.style.display = 'none';
        if (callback) callback();
      }
    }
    typeChar();
  }

  function stopTyping() {
    if (typeTimer) { clearTimeout(typeTimer); typeTimer = null; }
  }

  // 显示完整文本（不打字机效果）
  function showFullText(text) {
    stopTyping();
    textBox.textContent = text;
  }

  // ========== 导航 ==========
  function buildNav() {
    var nav = $('chNav');
    if (!nav) return;
    var story = STORIES[currentStory];
    nav.innerHTML = '';
    for (var i = 0; i < story.chapters.length; i++) {
      (function(idx) {
        var b = document.createElement('button');
        b.className = 'ch-btn' + (idx === currentCh ? ' active' : '');
        b.textContent = idx + 1;
        b.setAttribute('data-ch', idx);
        b.addEventListener('click', function() {
          stopAndLoad(idx);
        });
        nav.appendChild(b);
      })(i);
    }
  }

  function updateNav() {
    var btns = document.querySelectorAll('.ch-btn');
    for (var i = 0; i < btns.length; i++) {
      btns[i].className = (i === currentCh) ? 'ch-btn active' : 'ch-btn';
    }
  }

  function updateProgress() {
    var story = STORIES[currentStory];
    var total = story.chapters.length;
    if (progTextEl) progTextEl.textContent = '\u7B2C ' + (currentCh + 1) + ' / ' + total + ' \u7AE0';
    if (progFillEl) progFillEl.style.width = ((currentCh + 1) / total * 100) + '%';
  }

  // ========== 核心播放逻辑 ==========
  function stopAndLoad(chIdx) {
    // 停止当前播放
    stopTyping();
    if (audio) { audio.pause(); audio.removeAttribute('src'); audio.load(); }
    isPlaying = false;
    playBtn.textContent = '\u5F00\u59CB\u6717\u8BFB';
    showEl('loadingEl', false);
    clearError();

    // 加载新章节
    currentCh = chIdx;
    var story = STORIES[currentStory];
    var text = story.chapters[currentCh];

    // 显示文本（打字机效果）
    startTyping(text);
    updateNav();
    updateProgress();

    if (hintEl) hintEl.style.display = 'block';
  }

  function doPlay() {
    clearError();
    var story = STORIES[currentStory];
    var src = getBaseUrl() + 'audio/ch' + (currentCh + 1) + '.mp3';

    // 首次播放或切换章节时设置音频源
    if (audio.getAttribute('data-cur') !== src) {
      audio.src = src;
      audio.setAttribute('data-cur', src);
      showEl('loadingEl', true);
    }

    if (hintEl) hintEl.style.display = 'none';

    var p = audio.play();
    if (p && typeof p.then === 'function') {
      p.then(function() {
        isPlaying = true;
        playBtn.textContent = '\u6682\u505C';
        showEl('loadingEl', false);
      }).catch(function(err) {
        showEl('loadingEl', false);
        // 微信自动播放被拦截的提示
        setError('\u8BF7\u70B9\u51FB\u64AD\u653E\u6309\u94AE\u5F00\u59CB\u6536\u542C');
      });
    } else {
      isPlaying = true;
      playBtn.textContent = '\u6682\u505C';
      showEl('loadingEl', false);
    }
  }

  // ========== 事件绑定 ==========
  playBtn.addEventListener('click', function(e) {
    if (e) e.preventDefault();
    clearError();
    if (!isPlaying) {
      if (audio && audio.ended) { audio.currentTime = 0; }
      doPlay();
    } else {
      if (audio) audio.pause();
      isPlaying = false;
      playBtn.textContent = '\u7EE7\u7EED\u6717\u8BFB';
    }
  });

  prevBtn.addEventListener('click', function(e) {
    if (e) e.preventDefault();
    if (currentCh > 0) stopAndLoad(currentCh - 1);
  });

  nextBtn.addEventListener('click', function(e) {
    if (e) e.preventDefault();
    var story = STORIES[currentStory];
    if (currentCh < story.chapters.length - 1) stopAndLoad(currentCh + 1);
  });

  if (audio) {
    audio.addEventListener('ended', function() {
      isPlaying = false;
      var story = STORIES[currentStory];
      if (currentCh < story.chapters.length - 1) {
        // 自动跳转到下一章，显示文本但不自动播放
        currentCh++;
        updateNav();
        updateProgress();
        var text = story.chapters[currentCh];
        startTyping(text);
        playBtn.textContent = '\u25B6 \u7EE7\u7EED\u4E0B\u4E00\u7AE0';
      } else {
        // 全部播完
        if (progFillEl) progFillEl.style.width = '100%';
        playBtn.textContent = '\u91CD\u65B0\u64AD\u653E';
        currentCh = 0;
        buildNav();
        updateProgress();
        showFullText(story.chapters[0]);
      }
    });

    audio.addEventListener('error', function() {
      showEl('loadingEl', false);
      setError('\u97F3\u9891\u52A0\u8F7D\u5931\u8D25\uFF0C\u8BF7\u68C0\u67E5\u7F51\u7EDC\u540E\u91CD\u8BD5');
    });
  }

  // ========== 初始化 ==========
  function init() {
    try {
      var story = STORIES[currentStory];
      storyTitleEl.textContent = story.title;
      document.title = '\u5B9D\u8D1D\u665A\u5B89 \xB7 ' + story.title;

      buildNav();
      updateProgress();

      // 显示第一章文本（打字机效果）
      var text = story.chapters[0];
      startTyping(text);
    } catch(e) {
      document.body.innerHTML = '<p style="color:red;padding:20px;font-size:14px;">\u52A0\u8F7D\u5931\u8D25: ' + e.message + '</p>';
    }
  }

  init();
})();
</script>
</body>
</html>
