<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>宝贝晚安 · 睡前故事</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#0a0a2e;color:#fff;min-height:100vh;overflow-x:hidden}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
.title{font-size:28px;font-weight:700;background:linear-gradient(135deg,#ffd700,#ffb347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:20px 0 5px}
.subtitle{font-size:14px;color:rgba(255,255,255,.5);margin-bottom:20px}
.card{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:30px;max-width:600px;width:100%}
.story-title{font-size:22px;font-weight:600;color:#ffd700;text-align:center;margin-bottom:6px}
.chapter-nav{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:12px 0 20px}
.ch-btn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,215,0,.3);background:rgba(255,215,0,.08);color:#ffd700;font-size:13px;cursor:pointer;transition:all .3s}
.ch-btn.active{background:#ffd700;color:#0a0a2e;font-weight:700;border-color:#ffd700}
.ch-btn:hover{transform:scale(1.1)}
.text-box{min-height:160px;font-size:20px;line-height:2;color:rgba(255,255,255,.9);text-align:center;padding:10px 0;letter-spacing:1px}
.text-box .cursor{display:inline-block;width:2px;height:20px;background:#ffd700;vertical-align:middle;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.controls{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.btn{padding:10px 24px;border-radius:20px;border:1px solid rgba(255,215,0,.4);background:rgba(255,215,0,.1);color:#ffd700;font-size:15px;cursor:pointer;transition:all .3s;white-space:nowrap}
.btn:hover{background:rgba(255,215,0,.25);transform:translateY(-1px)}
.btn.primary{background:#ffd700;color:#0a0a2e;font-weight:600;border-color:#ffd700}
.speed-wrap{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:14px;font-size:13px;color:rgba(255,255,255,.5)}
.speed-btn{padding:4px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;transition:all .3s}
.speed-btn.active{background:rgba(255,215,0,.15);color:#ffd700;border-color:rgba(255,215,0,.4)}
.progress{display:flex;align-items:center;gap:10px;margin-top:16px;font-size:12px;color:rgba(255,255,255,.4)}
.prog-bar{flex:1;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#ffd700,#ffb347);width:0;transition:width .3s}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="wrap">
  <div class="title">🌙 宝贝晚安</div>
  <div class="subtitle">今日睡前故事 · 每天一个新故事</div>
  <div class="card">
    <div class="story-title" id="storyTitle">月光森林的小精灵</div>
    <div class="chapter-nav" id="chNav"></div>
    <div class="text-box" id="textBox"><span class="cursor"></span></div>
    <div class="controls">
      <button class="btn primary" id="playBtn" onclick="togglePlay()">开始朗读</button>
      <button class="btn" onclick="prevChapter()">上一章</button>
      <button class="btn" onclick="nextChapter()">下一章</button>
    </div>
    <div class="speed-wrap">
      <span>语速：</span>
      <button class="speed-btn" onclick="setSpeed(0.7)">慢</button>
      <button class="speed-btn active" onclick="setSpeed(0.95)">正常</button>
      <button class="speed-btn" onclick="setSpeed(1.3)">快</button>
    </div>
    <div class="progress">
      <span id="progText">第 1 / 6 章</span>
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
    </div>
  </div>
</div>
<script>
const story = {
  title: "月光森林的小精灵",
  chapters: [
    "在很远很远的月光森林深处，住着一只只有巴掌大的小精灵，她的名字叫豆豆。豆豆有一对透明亮晶晶的翅膀，每到夜晚就会发出淡淡的银色光芒，像一盏小小的灯笼。她最喜欢做的事，就是坐在最高的那棵橡树上，对着月亮弹她的月亮琴。",
    "一天晚上，豆豆正在弹琴，忽然听到一阵轻轻的哭声。她循着声音飞过去，发现一只小松鼠蹲在大蘑菇下面发抖。小松鼠的眼泪像珍珠一样滴落在草叶上，\"我迷路了，找不到回家的方向……\"小松鼠抽泣着说。",
    "\"别怕别怕，我来送你回家。\"豆豆温柔地拍了拍小松鼠的脑袋，用闪亮的翅膀轻轻抱了抱它。小松鼠擦了擦眼泪，露出一个小小的笑容，紧紧跟在豆豆身后，一起出发了。",
    "回家的路上，他们经过了一片萤火虫草地。成千上万的萤火虫同时亮起小灯，像满天星星落在了地上，美得让人屏住了呼吸。小松鼠开心地蹦蹦跳跳，把迷路的害怕全都忘光了。",
    "终于到了小松鼠的家。松鼠妈妈紧紧抱住了小松鼠，激动得说不出话来。她拿出最甜的松果送给豆豆，\"谢谢你，善良的小精灵！\"豆豆开心地摆摆手，飞回了她的橡树上，继续弹起了月亮琴。",
    "夜渐渐深了，月光温柔地洒满了整座森林。豆豆打了个小小的哈欠，收起透明的翅膀，蜷缩在一片柔软的花瓣上。\"晚安，月光森林。晚安，小松鼠。\"她轻轻地说着，嘴角带着微笑，甜甜地进入了梦乡。"
  ]
};

let currentCh = 0;
let isPlaying = false;
let isPaused = false;
let charIndex = 0;
let synth = window.speechSynthesis;
let utterance = null;
let rate = 0.95;
let voice = null;

function init() {
  document.getElementById('storyTitle').textContent = story.title;
  buildNav();
  loadChapter(0);
  pickVoice();
}

function buildNav() {
  const nav = document.getElementById('chNav');
  nav.innerHTML = '';
  story.chapters.forEach((_, i) => {
    const b = document.createElement('button');
    b.className = 'ch-btn' + (i === currentCh ? ' active' : '');
    b.textContent = i + 1;
    b.onclick = () => { stopSpeech(); loadChapter(i); };
    nav.appendChild(b);
  });
}

function loadChapter(i) {
  currentCh = i;
  charIndex = 0;
  isPlaying = false;
  isPaused = false;
  document.getElementById('playBtn').textContent = '开始朗读';
  document.getElementById('textBox').innerHTML = '<span class="cursor"></span>';
  updateNav();
  updateProgress();
}

function updateNav() {
  document.querySelectorAll('.ch-btn').forEach((b, i) => {
    b.className = 'ch-btn' + (i === currentCh ? ' active' : '');
  });
}

function updateProgress() {
  document.getElementById('progText').textContent = `第 ${currentCh+1} / ${story.chapters.length} 章`;
  document.getElementById('progFill').style.width = ((currentCh) / story.chapters.length * 100) + '%';
}

function pickVoice() {
  function find() {
    const voices = synth.getVoices();
    const female = voices.find(v => v.lang.startsWith('zh') && /female|女|xiaoxiao|yaoyao|xiaoyi|小/i.test(v.name));
    if (female) return female;
    const zh = voices.find(v => v.lang.startsWith('zh'));
    if (zh) return zh;
    const cn = voices.find(v => v.lang.startsWith('cmn'));
    if (cn) return cn;
    return voices.find(v => v.name.includes('Google')) || voices[0];
  }
  voice = find();
  if (!voice) { synth.onvoiceschanged = () => { voice = find(); }; }
}

function togglePlay() {
  if (!isPlaying) {
    startPlay();
  } else if (isPaused) {
    synth.resume();
    isPaused = false;
    document.getElementById('playBtn').textContent = '暂停';
  } else {
    synth.pause();
    isPaused = true;
    document.getElementById('playBtn').textContent = '继续';
  }
}

let animFrame = null;
let targetChar = 0;  // boundary告诉我们的目标位置
let animStart = 0;   // 动画开始时间
let animFrom = 0;    // 动画起始位置

function smoothStep(t) {
  return t * t * (3 - 2 * t); // smoothstep缓动
}

function animateText(text) {
  const now = Date.now();
  const elapsed = now - animStart;
  const duration = 180; // 每次跳字的过渡时间(ms)
  const t = Math.min(elapsed / duration, 1);
  const eased = smoothStep(t);

  charIndex = Math.round(animFrom + (targetChar - animFrom) * eased);
  charIndex = Math.min(charIndex, text.length);
  renderText(text);

  if (t < 1 && charIndex < text.length) {
    animFrame = requestAnimationFrame(() => animateText(text));
  }
}

function moveToChar(newTarget, text) {
  if (newTarget === charIndex) return;
  animFrom = charIndex;
  targetChar = newTarget;
  animStart = Date.now();
  if (animFrame) cancelAnimationFrame(animFrame);
  animFrame = requestAnimationFrame(() => animateText(text));
}

function startPlay() {
  if (synth.speaking) synth.cancel();
  if (animFrame) cancelAnimationFrame(animFrame);
  const text = story.chapters[currentCh];
  charIndex = 0;
  targetChar = 0;
  animFrom = 0;
  isPlaying = true;
  isPaused = false;
  document.getElementById('playBtn').textContent = '暂停';

  utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-CN';
  utterance.rate = rate;
  utterance.pitch = 1.1;
  if (voice) utterance.voice = voice;

  let hasBoundary = false;
  utterance.onboundary = (e) => {
    if (e.name === 'word' || e.name === 'sentence') {
      hasBoundary = true;
      moveToChar(e.charIndex, text);
    }
  };

  // fallback：如果没有boundary事件，用估算推进
  const startTime = Date.now();
  let fbTimer = setInterval(() => {
    if (hasBoundary || charIndex >= text.length) { clearInterval(fbTimer); return; }
    const elapsed = (Date.now() - startTime) / 1000;
    const estimated = Math.min(Math.floor(elapsed * rate * 3.2), text.length);
    moveToChar(estimated, text);
    if (charIndex >= text.length) clearInterval(fbTimer);
  }, 200);

  utterance.onend = () => {
    clearInterval(fbTimer);
    if (animFrame) cancelAnimationFrame(animFrame);
    charIndex = text.length;
    renderText(text);
    if (currentCh < story.chapters.length - 1) {
      setTimeout(() => {
        currentCh++;
        buildNav();
        updateProgress();
        startPlay();
      }, 1500);
    } else {
      document.getElementById('progFill').style.width = '100%';
      setTimeout(() => {
        isPlaying = false;
        document.getElementById('playBtn').textContent = '重新播放';
        currentCh = 0;
        buildNav();
        updateProgress();
      }, 2500);
    }
  };

  utterance.onerror = (e) => {
    if (e.error !== 'interrupted') console.warn('语音错误:', e.error);
    clearInterval(fbTimer);
  };

  synth.speak(utterance);
  renderText(text);
}

function renderText(text) {
  const shown = text.substring(0, charIndex);
  document.getElementById('textBox').innerHTML = shown + '<span class="cursor"></span>';
}

function stopSpeech() {
  synth.cancel();
  if (animFrame) cancelAnimationFrame(animFrame);
  isPlaying = false;
  isPaused = false;
}
function prevChapter() { if (currentCh > 0) { stopSpeech(); loadChapter(currentCh - 1); } }
function nextChapter() { if (currentCh < story.chapters.length - 1) { stopSpeech(); loadChapter(currentCh + 1); } }

function setSpeed(s) {
  rate = s;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (isPlaying) { stopSpeech(); startPlay(); }
}

// ===== 星空背景 =====
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let stars = [], fireflies = [];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

function initStars() {
  stars = [];
  for (let i = 0; i < 180; i++) {
    stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.5+.5, a: Math.random(), da: (Math.random()-.5)*.02 });
  }
  fireflies = [];
  for (let i = 0; i < 6; i++) {
    fireflies.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-.5)*.5, vy: (Math.random()-.5)*.5, r: Math.random()*3+2, a: Math.random() });
  }
}

function drawBg(t) {
  ctx.fillStyle = '#0a0a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const mx = canvas.width*.8, my = canvas.height*.15, mr = 40;
  const glow = ctx.createRadialGradient(mx, my, mr*.5, mx, my, mr*4);
  glow.addColorStop(0, 'rgba(255,248,220,0.15)');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(mx-mr*4, my-mr*4, mr*8, mr*8);
  ctx.beginPath();
  ctx.arc(mx, my, mr+Math.sin(t*.002)*2, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,248,220,0.9)';
  ctx.fill();

  stars.forEach(s => {
    s.a += s.da;
    if (s.a > 1 || s.a < .1) s.da *= -1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${s.a})`;
    ctx.fill();
  });

  fireflies.forEach(f => {
    f.x += f.vx; f.y += f.vy;
    f.a += (Math.random()-.5)*.05;
    if (f.x<0||f.x>canvas.width) f.vx*=-1;
    if (f.y<0||f.y>canvas.height) f.vy*=-1;
    f.a = Math.max(.1, Math.min(1, f.a));
    const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r*4);
    g.addColorStop(0, `rgba(200,255,100,${f.a*.6})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(f.x-f.r*4, f.y-f.r*4, f.r*8, f.r*8);
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(220,255,130,${f.a})`;
    ctx.fill();
  });

  requestAnimationFrame(drawBg);
}

window.addEventListener('resize', () => { resize(); initStars(); });
resize();
initStars();
requestAnimationFrame(drawBg);
init();
</script>
</body>
</html>
