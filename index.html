<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小狐狸橙橙的月亮信</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d1b2a 0%, #1a2f4a 40%, #0f2035 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #e8d8b0;
      padding: 20px;
    }

    /* 遮罩层 */
    #overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #0d1b2a 0%, #050d18 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 20px;
    }
    .overlay-title {
      font-size: clamp(22px, 6vw, 36px);
      font-weight: bold;
      color: #ffd97d;
      text-align: center;
      text-shadow: 0 0 20px rgba(255,217,125,0.6);
    }
    .overlay-subtitle {
      font-size: clamp(13px, 3vw, 17px);
      color: #b0c4d8;
      opacity: 0.85;
    }
    #startBtn {
      margin-top: 10px;
      padding: 14px 36px;
      font-size: 17px;
      background: linear-gradient(135deg, #ffd97d, #f4a94e);
      color: #1a1a2e;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 24px rgba(255,200,80,0.5);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); box-shadow: 0 0 24px rgba(255,200,80,0.5); }
      50% { transform: scale(1.06); box-shadow: 0 0 38px rgba(255,200,80,0.8); }
    }

    /* 主内容 */
    .container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .story-title {
      font-size: clamp(20px, 5vw, 28px);
      font-weight: bold;
      color: #ffd97d;
      text-align: center;
      text-shadow: 0 0 16px rgba(255,217,125,0.5);
    }
    .story-desc {
      font-size: 13px;
      color: #7fa8c4;
      text-align: center;
    }

    /* 章节按钮（隐藏，保留逻辑用于高亮跟踪） */
    .chapter-nav {
      display: none;
    }
    .ch-btn {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,217,125,0.25);
      background: rgba(255,255,255,0.04);
      color: #b0c4d8;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ch-btn.active {
      background: linear-gradient(135deg, #ffd97d, #f4a94e);
      color: #1a1a2e;
      border-color: transparent;
      font-weight: bold;
      box-shadow: 0 0 12px rgba(255,200,80,0.4);
    }
    .ch-btn:hover:not(.active) {
      background: rgba(255,217,125,0.12);
      border-color: rgba(255,217,125,0.5);
    }

    /* 故事文本卡片 */
    .story-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,217,125,0.12);
      border-radius: 16px;
      padding: 20px 22px;
      font-size: clamp(14px, 3.5vw, 16px);
      line-height: 1.9;
      color: #d4e8f0;
      min-height: 90px;
    }

    /* 音频播放器 */
    .audio-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    audio {
      width: 100%;
      border-radius: 10px;
    }

    /* 底部控制栏 */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .nav-btn {
      flex: 1;
      padding: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,217,125,0.2);
      border-radius: 12px;
      color: #e8d8b0;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-btn:hover:not(:disabled) {
      background: rgba(255,217,125,0.12);
      border-color: rgba(255,217,125,0.5);
    }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .auto-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      color: #7fa8c4;
      white-space: nowrap;
    }
    .toggle-dot {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      position: relative;
      transition: background 0.3s;
    }
    .toggle-dot::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      top: 3px;
      left: 3px;
      transition: left 0.3s;
    }
    .toggle-dot.on {
      background: linear-gradient(135deg, #ffd97d, #f4a94e);
    }
    .toggle-dot.on::after { left: 19px; }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #4a6a82;
      padding-top: 4px;
    }
  </style>
</head>
<body>

<!-- 开始遮罩层 -->
<div id="overlay">
  <div class="overlay-title">小狐狸橙橙的月亮信</div>
  <div class="overlay-subtitle">温馨睡前故事 · 香甜入梦</div>
  <button id="startBtn" onclick="startStory()">点击开始听故事 ✨</button>
</div>

<!-- 主内容 -->
<div class="container">
  <div class="story-title">小狐狸橙橙的月亮信</div>
  <div class="story-desc">共 7 章 · 每天晚上更新</div>

  <!-- 章节按钮 -->
  <div class="chapter-nav" id="chapterNav"></div>

  <!-- 故事文本 -->
  <div class="story-card" id="storyText"></div>

  <!-- 音频 -->
  <div class="audio-wrap">
    <audio id="player" controls preload="none" playsinline webkit-playsinline></audio>
  </div>

  <!-- 控制栏 -->
  <div class="controls">
    <button class="nav-btn" id="prevBtn" onclick="changeChapter(currentChapter - 1)">← 上一章</button>
    <label class="auto-toggle" onclick="toggleAuto()">
      <div class="toggle-dot on" id="autoToggle"></div>
      <span id="autoLabel">自动连播</span>
    </label>
    <button class="nav-btn" id="nextBtn" onclick="changeChapter(currentChapter + 1)">下一章 →</button>
  </div>

  <div class="footer-note">愿小朗星降临，带你进入甜蜜美梦 🌟</div>
</div>

<script>
const chapters = [
  {
    title: "第1章",
    text: "橘子林的最深处，住着一只毛色金红的小狐狸，名叫橙橙。她有一个独特的习惯——每天夜晚，当星星爬上树梢，她就会坐在窗边，用树叶做成小纸片，认认真真地给月亮写一封信。信里装着她今天捡到的漂亮松果，装着和蝴蝶捉迷藏的趣事，装着吃到一颗特别甜的野草莓时那种欢喜的感觉。她相信，月亮姐姐一定会看到的。",
    url: "audio/ch1.mp3"
  },
  {
    title: "第2章",
    text: "今晚的月亮又大又圆，把橘子林照得亮堂堂的。橙橙折好了信，想了想，觉得光靠风寄信太慢了。于是她跑到小溪边，找来一片宽宽的芭蕉叶，仔仔细细地折成一艘小船，把信轻轻放进去。她用手指轻轻推了一下，小船就咕噜咕噜地漂上了水面，顺着弯弯的溪流，向着月光最亮的地方漂去。橙橙趴在溪边，看得入了迷，嘴角弯成了一个小月牙。",
    url: "audio/ch2.mp3"
  },
  {
    title: "第3章",
    text: "小船越漂越远，夜莺姐姐从树上探出头来，看见了这艘可爱的叶子船，忍不住为它唱起了歌。叮叮咚咚的歌声在林子里回荡，萤火虫们也跟着飞过来，围着小船转圈圈，像是给它点上了一盏盏小灯笼。小青蛙坐在石头上，呱呱地跟着打节拍。整个橘子林都热闹起来了，好像在举行一场专门为这封信举办的送行晚会，美妙极了。",
    url: "audio/ch3.mp3"
  },
  {
    title: "第4章",
    text: "月亮姐姐低下头，看见了那艘亮亮的叶子船，弯弯地笑了。她把最柔软的银色月光，像一条轻盈的绸缎，慢慢铺满了整片橘子林。金色的橘子变成了银白色，每一片叶子上都挂着一颗小小的光珠。橙橙仰起头，感觉那束月光轻轻落在她的耳朵尖上，暖暖的，软软的。她深深地吸了一口带着橘花香的夜风，觉得整个世界都在悄悄地告诉她：你被看见了，你被爱着。",
    url: "audio/ch4.mp3"
  },
  {
    title: "第5章",
    text: "正当橙橙准备回家，草丛里传来一阵窸窸窣窣的声音。好朋友小松鼠栗栗跳了出来，毛茸茸的大尾巴摇得像一把小扇子。她睁着圆圆的眼睛，好奇地问：橙橙，你在做什么呀？橙橙把给月亮写信的事情告诉了她，栗栗一下子就激动了，拍着爪子说：我也要写！我要告诉月亮，我今天找到了今年最大的一颗橡果！于是两个小伙伴趴在溪边，一起认认真真地折起了更多的叶子船。",
    url: "audio/ch5.mp3"
  },
  {
    title: "第6章",
    text: "一艘、两艘、三艘……小溪上漂满了叶子船，每一艘都装着一个小小的心愿。月亮越升越高，光芒越来越柔和，像妈妈的手轻轻抚过树梢。风也慢下来了，不再调皮地乱跑，而是温温柔柔地绕着橘子林转圈，把睡意一点一点地洒进每一个角落。橙橙听见自己的眼皮变得好沉好沉，打了一个长长的哈欠，栗栗也眯起了眼睛，靠在她的肩膀上，两个小伙伴的呼吸慢慢变得一样深。",
    url: "audio/ch6.mp3"
  },
  {
    title: "第7章",
    text: "橙橙趴在松软的落叶堆里，枕着秋天温暖的气息。她望着月亮，心里满满当当的，装着今天所有快乐的事情。她轻轻闭上眼睛，嘴角还带着一个小小的微笑。月亮姐姐低下头，用最温柔的银光为她盖上一条光的被子，萤火虫们绕着她慢慢飞，一盏一盏，像是在守护着她的梦。橙橙的梦里，小溪还在流，叶子船还在漂，月亮姐姐正在读她的信，笑得很甜。晚安，小朋友，好梦。",
    url: "audio/ch7.mp3"
  }
];

let currentChapter = 0;
let autoPlay = true;
let pendingPlay = false; // 熄屏期间翻章，需在亮屏后续播

const player = document.getElementById('player');
const nav = document.getElementById('chapterNav');

// 生成章节按钮（隐藏但保留逻辑）
chapters.forEach((ch, i) => {
  const btn = document.createElement('button');
  btn.className = 'ch-btn' + (i === 0 ? ' active' : '');
  btn.id = 'ch-' + i;
  btn.textContent = ch.title;
  btn.onclick = () => changeChapter(i);
  nav.appendChild(btn);
});

function startStory() {
  document.getElementById('overlay').style.display = 'none';
  loadChapter(0);
  player.play().catch(() => {});
}

function loadChapter(idx) {
  if (idx < 0 || idx >= chapters.length) return;
  currentChapter = idx;
  const ch = chapters[idx];

  document.getElementById('storyText').textContent = ch.text;

  player.src = ch.url;
  player.load();

  document.querySelectorAll('.ch-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });

  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === chapters.length - 1;
}

function changeChapter(idx) {
  if (idx < 0 || idx >= chapters.length) return;
  loadChapter(idx);
  if (document.hidden) {
    // 页面不可见（熄屏/后台），先标记待播放
    pendingPlay = true;
  } else {
    pendingPlay = false;
    player.play().catch(() => {});
  }
}

function toggleAuto() {
  autoPlay = !autoPlay;
  const dot = document.getElementById('autoToggle');
  const label = document.getElementById('autoLabel');
  dot.classList.toggle('on', autoPlay);
  label.textContent = autoPlay ? "自动连播" : "单章播放";
}

function updateAutoToggle() {
  const dot = document.getElementById('autoToggle');
  const label = document.getElementById('autoLabel');
  dot.classList.toggle('on', autoPlay);
  label.textContent = autoPlay ? "自动连播" : "单章播放";
}

// 音频结束自动跳下一章
player.addEventListener('ended', () => {
  if (autoPlay && currentChapter < chapters.length - 1) {
    changeChapter(currentChapter + 1);
  }
});

// 亮屏/切回前台时，如果有待播放任务则立即播
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && pendingPlay) {
    pendingPlay = false;
    player.play().catch(() => {});
  }
});

// iOS Safari 某些情况下用 pageshow 兜底
window.addEventListener('pageshow', () => {
  if (pendingPlay) {
    pendingPlay = false;
    player.play().catch(() => {});
  }
});

// 初始化
loadChapter(0);
updateAutoToggle();
</script>
</body>
</html>
