<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小海龟豆豆的寻星之旅</title>
    <style>
        body { 
            margin: 0; padding: 20px;
            background: linear-gradient(to bottom, #0a0a2e, #1a1a4e);
            color: #fff;
            font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",Arial,sans-serif;
            text-align: center;
            min-height: 100vh;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        p { color: #aaa; margin-bottom: 30px; }
        .start-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 10, 46, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .start-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000; border: none;
            padding: 20px 50px;
            font-size: 1.5rem; font-weight: bold;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            animation: pulse 2s infinite;
        }
        .start-btn:active { transform: scale(0.95); }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 60px rgba(255, 215, 0, 0.8); }
        }
        .player { 
            background: rgba(255,255,255,0.1); 
            padding: 20px; border-radius: 15px;
            margin-bottom: 20px;
        }
        audio { width: 100%; margin-bottom: 15px; border-radius: 8px; }
        .chapter-title { font-size: 1.2rem; margin-bottom: 10px; color: #ffd700; }
        .chapter-text { text-align: left; line-height: 1.8; color: #ddd; margin-bottom: 15px; font-size: 1rem; }
        .nav { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        button { 
            background: #ffd700; color: #000; border: none; 
            padding: 10px 20px; border-radius: 5px; cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
        }
        button:hover { background: #ffed4e; }
        button:disabled { background: #666; cursor: not-allowed; }
        button:active { transform: scale(0.96); }
        .auto-badge { 
            display: inline-block; background: #4CAF50; 
            color: white; padding: 5px 15px; 
            border-radius: 20px; font-size: 0.9rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="start-overlay" id="startOverlay">
        <button class="start-btn" onclick="startPlaying()">
            ⭐ 点击开始听故事 ⭐
        </button>
    </div>

    <div class="container">
        <h1>⭐ 小海龟豆豆的寻星之旅 ⭐</h1>
        <p>睡前故事 · 女声朗读</p>
        <div class="auto-badge" id="autoBadge">🔄 自动播放已开启</div>
        
        <div class="player">
            <div class="chapter-title" id="title">第一章：星海的小海龟</div>
            <audio id="player" controls preload="none" playsinline webkit-playsinline>
                <source id="audioSource" src="audio/ch1.mp3" type="audio/mpeg">
            </audio>
            <div class="chapter-text" id="text">在蔚蓝的大海边，住着一只名叫豆豆的小海龟。豆豆有一个特别的爱好，就是每天晚上趴在沙滩上数星星。他总觉得自己听见过星星落在海面上的声音，叮咚一声，像一串银色的风铃。</div>
        </div>
        
        <div class="nav">
            <button id="prevBtn" onclick="prevChapter()">◀ 上一章</button>
            <button id="nextBtn" onclick="nextChapter()">下一章 ▶</button>
        </div>
        
        <div style="margin-top: 15px;">
            <label style="cursor:pointer; color:#aaa; font-size:0.95rem;">
                <input type="checkbox" id="autoPlayCheckbox" checked onchange="toggleAutoPlay()" style="margin-right:5px;">
                自动播放下一章
            </label>
        </div>
        
        <div id="chapterList" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px;"></div>
    </div>

    <script>
        var autoPlayEnabled = true;
        var currentIndex = 0;
        
        var chapters = [
            {"title": "第一章：星海的小海龟", "text": "在蔚蓝的大海边，住着一只名叫豆豆的小海龟。豆豆有一个特别的爱好，就是每天晚上趴在沙滩上数星星。他总觉得自己听见过星星落在海面上的声音，叮咚一声，像一串银色的风铃。", "url": "audio/ch1.mp3"},
            {"title": "第二章：流星划过", "text": "一天晚上，一颗流星划过天际，落在了远处的珊瑚礁旁。豆豆兴奋极了，他决定游过去找那颗星星。月光洒在海面上，像铺了一层银色的毯子，豆豆的小鳍轻轻划开波浪。", "url": "audio/ch2.mp3"},
            {"title": "第三章：发光的水母", "text": "游啊游，豆豆遇到了一只发光的水母。水母名叫球球，浑身散发着蓝色的柔光。球球好奇地问豆豆：你要去哪里呀？豆豆说：我要去找落在海里的星星！球球想了想说：我陪你去吧，我的光可以帮你照亮路。", "url": "audio/ch3.mp3"},
            {"title": "第四章：珊瑚森林", "text": "他们一起穿过了一片美丽的珊瑚森林。红色的珊瑚像小树，紫色的海葵像花朵，还有好多小鱼在中间游来游去。一只小丑鱼探出头来问：你们在找什么呢？豆豆说：在找一颗从天上掉下来的星星。", "url": "audio/ch4.mp3"},
            {"title": "第五章：海底的星星", "text": "终于，豆豆在珊瑚礁的缝隙里发现了那颗星星，原来是一颗圆圆的、会发光的夜明珠。它安安静静地躺在那里，发出温暖的光芒，照亮了周围的每一块小石头。", "url": "audio/ch5.mp3"},
            {"title": "第六章：海底灯会", "text": "豆豆轻轻用小鳍碰了碰夜明珠，它突然亮了好多倍，整个海底都被照得金灿灿的。海马、小螃蟹、海星都跑过来看热闹。大家围坐在一起，像开了一场海底的灯会。", "url": "audio/ch6.mp3"},
            {"title": "第七章：晚安小海龟", "text": "豆豆抱着夜明珠慢慢游回了家。他把夜明珠放在沙滩上的小窝旁，整个夜晚都亮堂堂的。海浪轻轻拍着沙滩，像在唱一首温柔的摇篮曲。豆豆缩进壳里，甜甜地睡着了。晚安，小海龟。晚安，全世界。", "url": "audio/ch7.mp3"}
        ];

        function getBaseUrl() {
            var base = window.location.pathname;
            base = base.substring(0, base.lastIndexOf('/') + 1);
            return base || '/';
        }

        function toggleAutoPlay() {
            autoPlayEnabled = document.getElementById('autoPlayCheckbox').checked;
            document.getElementById('autoBadge').textContent = autoPlayEnabled ? '🔄 自动播放已开启' : '⏸️ 自动播放已关闭';
            document.getElementById('autoBadge').style.background = autoPlayEnabled ? '#4CAF50' : '#666';
        }

        function loadChapter(index) {
            if (index < 0 || index >= chapters.length) return;
            currentIndex = index;
            var ch = chapters[index];
            document.getElementById('title').textContent = ch.title;
            document.getElementById('text').textContent = ch.text;
            document.getElementById('audioSource').src = ch.url;
            document.getElementById('player').load();
            
            if (autoPlayEnabled) {
                document.getElementById('player').play().catch(function(e) { console.log('Auto-play blocked'); });
            }
            
            document.getElementById('prevBtn').disabled = index === 0;
            document.getElementById('nextBtn').disabled = index === chapters.length - 1;
            var btns = document.querySelectorAll('.chapter-btn');
            for (var i = 0; i < btns.length; i++) {
                btns[i].style.background = i === index ? '#ffed4e' : '#ffd700';
            }
        }

        function prevChapter() {
            if (currentIndex > 0) loadChapter(currentIndex - 1);
        }

        function nextChapter() {
            if (currentIndex < chapters.length - 1) loadChapter(currentIndex + 1);
        }

        function startPlaying() {
            document.getElementById('startOverlay').style.display = 'none';
            loadChapter(0);
        }

        var list = document.getElementById('chapterList');
        for (var i = 0; i < chapters.length; i++) {
            (function(idx) {
                var btn = document.createElement('button');
                btn.className = 'chapter-btn';
                btn.textContent = '\u7B2C' + (idx + 1) + '\u7AE0';
                btn.onclick = function() {
                    if (document.getElementById('startOverlay').style.display !== 'none') {
                        startPlaying();
                    }
                    loadChapter(idx);
                };
                list.appendChild(btn);
            })(i);
        }

        document.getElementById('player').addEventListener('ended', function() {
            if (autoPlayEnabled && currentIndex < chapters.length - 1) {
                setTimeout(function() {
                    loadChapter(currentIndex + 1);
                }, 1000);
            }
        });
    </script>
</body>
</html>
