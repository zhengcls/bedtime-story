<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小狐狸橙橙的月亮信</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0d1b2a 0%, #1a2f4a 40%, #0f2035 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #e8d8b0;
      padding: 20px;
    }

    /* 遮罩层 */
    #overlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #0d1b2a 0%, #050d18 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 20px;
    }
    .overlay-title {
      font-size: clamp(22px, 6vw, 36px);
      font-weight: bold;
      color: #ffd97d;
      text-align: center;
      text-shadow: 0 0 20px rgba(255,217,125,0.6);
    }
    .overlay-subtitle {
      font-size: clamp(13px, 3vw, 17px);
      color: #b0c4d8;
      opacity: 0.85;
    }
    #startBtn {
      margin-top: 10px;
      padding: 14px 36px;
      font-size: 17px;
      background: linear-gradient(135deg, #ffd97d, #f4a94e);
      color: #1a1a2e;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 24px rgba(255,200,80,0.5);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); box-shadow: 0 0 24px rgba(255,200,80,0.5); }
      50% { transform: scale(1.06); box-shadow: 0 0 38px rgba(255,200,80,0.8); }
    }

    /* 主内容 */
    .container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .story-title {
      font-size: clamp(20px, 5vw, 28px);
      font-weight: bold;
      color: #ffd97d;
      text-align: center;
      text-shadow: 0 0 16px rgba(255,217,125,0.5);
    }
    .story-desc {
      font-size: 13px;
      color: #7fa8c4;
      text-align: center;
    }

    /* 章节按钮 */
    .chapter-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .ch-btn {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,217,125,0.25);
      background: rgba(255,255,255,0.04);
      color: #b0c4d8;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ch-btn.active {
      background: linear-gradient(135deg, #ffd97d, #f4a94e);
      color: #1a1a2e;
      border-color: transparent;
      font-weight: bold;
      box-shadow: 0 0 12px rgba(255,200,80,0.4);
    }
    .ch-btn:hover:not(.active) {
      background: rgba(255,217,125,0.12);
      border-color: rgba(255,217,125,0.5);
    }

    /* 故事文本卡片 */
    .story-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,217,125,0.12);
      border-radius: 16px;
      padding: 20px 22px;
      font-size: clamp(14px, 3.5vw, 16px);
      line-height: 1.9;
      color: #d4e8f0;
      min-height: 90px;
    }

    /* 音频播放器 */
    .audio-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    audio {
      width: 100%;
      border-radius: 10px;
    }

    /* 底部控制栏 */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .nav-btn {
      flex: 1;
      padding: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,217,125,0.2);
      border-radius: 12px;
      color: #e8d8b0;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-btn:hover:not(:disabled) {
      background: rgba(255,217,125,0.12);
      border-color: rgba(255,217,125,0.5);
    }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .auto-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      color: #7fa8c4;
      white-space: nowrap;
    }
    .toggle-dot {
      width: 36px;
      height: 20px;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      position: relative;
      transition: background 0.3s;
    }
    .toggle-dot::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      top: 3px;
      left: 3px;
      transition: left 0.3s;
    }
    .toggle-dot.on {
      background: linear-gradient(135deg, #ffd97d, #f4a94e);
    }
    .toggle-dot.on::after { left: 19px; }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #4a6a82;
      padding-top: 4px;
    }
  </style>
</head>
<body>

<!-- 开始遮罩层 -->
<div id="overlay">
  <div class="overlay-title">小狐狸橙橙的月亮信</div>
  <div class="overlay-subtitle">温馨睡前故事 · 香甜入梦</div>
  <button id="startBtn" onclick="startStory()">点击开始听故事 ✨</button>
</div>

<!-- 主内容 -->
<div class="container">
  <div class="story-title">小狐狸橙橙的月亮信</div>
  <div class="story-desc">共 7 章 · 每天晚上更新</div>

  <!-- 章节按钮 -->
  <div class="chapter-nav" id="chapterNav"></div>

  <!-- 故事文本 -->
  <div class="story-card" id="storyText"></div>

  <!-- 音频 -->
  <div class="audio-wrap">
    <audio id="player" controls preload="none" playsinline webkit-playsinline></audio>
  </div>

  <!-- 控制栏 -->
  <div class="controls">
    <button class="nav-btn" id="prevBtn" onclick="changeChapter(currentChapter - 1)">← 上一章</button>
    <label class="auto-toggle" onclick="toggleAuto()">
      <div class="toggle-dot on" id="autoToggle"></div>
      <span id="autoLabel">自动连播</span>
    </label>
    <button class="nav-btn" id="nextBtn" onclick="changeChapter(currentChapter + 1)">下一章 →</button>
  </div>

  <div class="footer-note">愿小朗星降临，带你进入甜蜜美梦 🌟</div>
</div>

<script>
const chapters = [
  {
    title: "第1章",
    text: "小狐狸橙橙住在橘子林里，每天晚上都要给月亮写一封信，把今天开心的事情说给月亮听。",
    url: "audio/ch1.mp3"
  },
  {
    title: "第2章",
    text: "今晚，橙橙用树叶折了一艘小船，把信放进去，轻轻地放到了小溪里，说：月亮姐姐，帮我把信带上去吧。",
    url: "audio/ch2.mp3"
  },
  {
    title: "第3章",
    text: "小溪咕噜咕噜地答应了，载着信慢慢漂远。夜莺在树上唱起了歌，好像在为那封信伴奏，美妙极了。",
    url: "audio/ch3.mp3"
  },
  {
    title: "第4章",
    text: "月亮听到了歌声，弯弯地笑了，把银色的光铺满整片橘子林。橙橙坐在树根旁，感觉整个世界都温暖亮堂堂的。",
    url: "audio/ch4.mp3"
  },
  {
    title: "第5章",
    text: "好朋友小松鼠跑来了，毛茸茸的尾巴摇啊摇，说：我也想给月亮写信！两个小伙伴一起折了好多树叶小船，放进小溪里。",
    url: "audio/ch5.mp3"
  },
  {
    title: "第6章",
    text: "小溪载着满满的信漂向远方，月亮越来越圆，光芒也越来越柔和，把睡意轻轻洒进森林的每一个角落。",
    url: "audio/ch6.mp3"
  },
  {
    title: "第7章",
    text: "橙橙趴在松软的落叶堆里，望着月亮，心里暖暖的。她轻轻闭上眼睛，嘴角带着微笑睡着了。月亮守护着她，直到天亮。晚安，好梦，小朋友。",
    url: "audio/ch7.mp3"
  }
];

let currentChapter = 0;
let autoPlay = true;

const player = document.getElementById('player');
const nav = document.getElementById('chapterNav');

// 生成章节按钮
chapters.forEach((ch, i) => {
  const btn = document.createElement('button');
  btn.className = 'ch-btn' + (i === 0 ? ' active' : '');
  btn.id = 'ch-' + i;
  btn.textContent = ch.title;
  btn.onclick = () => changeChapter(i);
  nav.appendChild(btn);
});

function startStory() {
  document.getElementById('overlay').style.display = 'none';
  loadChapter(0);
  // 用户点击按钮触发，此时可以安全播放（满足浏览器自动播放策略）
  player.play().catch(() => {});
}

function loadChapter(idx) {
  if (idx < 0 || idx >= chapters.length) return;
  currentChapter = idx;
  const ch = chapters[idx];

  // 更新文本
  document.getElementById('storyText').textContent = ch.text;

  // 更新音频
  player.src = ch.url;
  player.load();

  // 更新按钮高亮
  document.querySelectorAll('.ch-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });

  // 上下章按钮状态
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === chapters.length - 1;
}

function changeChapter(idx) {
  if (idx < 0 || idx >= chapters.length) return;
  loadChapter(idx);
  player.play().catch(() => {});
}

function toggleAuto() {
  autoPlay = !autoPlay;
  const dot = document.getElementById('autoToggle');
  const label = document.getElementById('autoLabel');
  dot.classList.toggle('on', autoPlay);
  label.textContent = autoPlay ? "自动连播" : "单章播放";
}

function updateAutoToggle() {
  const dot = document.getElementById('autoToggle');
  const label = document.getElementById('autoLabel');
  dot.classList.toggle('on', autoPlay);
  label.textContent = autoPlay ? "自动连播" : "单章播放";
}

// 音频结束自动跳下一章
player.addEventListener('ended', () => {
  if (autoPlay && currentChapter < chapters.length - 1) {
    changeChapter(currentChapter + 1);
  }
});

// 初始化
loadChapter(0);
updateAutoToggle();
</script>
</body>
</html>
